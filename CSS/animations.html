<!DOCTYPE html>
<html>

<head>
    <title>animations</title>
    <style>
        .container {
            width: 100vw;
            height: 100vh;
            background-color: beige;
        }

        .box {
            width: 400px;
            position: relative;
            height: 200px;
            margin: 10px;
            padding: 10px;
            border: 3px solid black;
            background-color: blue;
            animation-name: rightMovement;
            animation-duration: 2s;
            animation-iteration-count: 2;
            animation-delay: 2s;
            animation-timing-function: linear;
            /*linear- constant speed, ease-in-slow start fast end, ease-out-fast start slow end, ease-in-out-slow start and end*/
            /*cubic beizer-cubic-bezier(n,n,n,n)- n is between 0 and 1- n1,n2,n3,n4*/
            animation-direction: alternate;
            /*animation direction- normal, reverse, alternate, alternate-reverse*/
            animation-fill-mode: both;
            /*animation fill mode- none, forwards, backwards, both*/
        }

        @keyframes rightMovement {
            from {
                top: 0;
                left: 0;
            }

            to {
                top: 0px;
                left: 200px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">

        </div>
    </div>
</body>

</html>
<!--keyframes is used to create animations-->
