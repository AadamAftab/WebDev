<!DOCTYPE html>
<html>

<head>
    <title>transitions</title>
    <style>
        .box {
            width: 300px;
            height: 300px;
            background-color: red;
            transition-property: height;
            transition-duration: 2s;
            transition-timing-function: linear;
            transition-delay: 2s;
            /*modes- normal, ease, linear, ease-in, ease-out, ease-in-out*/
        }

        .box:hover {
            height: 500px;
        }
    </style>
</head>

<body>
    <div class="box">

    </div>
</body>

</html>
