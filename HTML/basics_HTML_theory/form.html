<!--label for forms-->
<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Test</title>
</head>

<body>
    <form action="">
        <label for="email">Enter name: </label><!--for is for identifying the id-->
        <input type="text" id="email" placeholder="enter email">
        <br>
        <label>Enter Age:</label>
        <input type="number" id="age">
        <br>
        <input type="submit" value="click here">
        <br>
        <input type="date" id="datepicker">
        <select name="dishes" id="selector1">
            <option value="maggi">Maggi</option>
            <option value="kurkure">Kurkure</option>
            <option value="chips">Chips</option>
        </select>
        <br>
        <br>
        <button>Main Hu Button</button>
        <textarea name="textarea" id="textarea" cols="30" rows="10" placeholder="enter text here....."></textarea>
    </form>
    <form>
        <fieldset>
            <legend>Choose your favorite monster</legend>

            <input type="radio" id="kraken" name="monster" value="K" />
            <label for="kraken">Kraken</label><br />

            <input type="radio" id="sasquatch" name="monster" value="S" />
            <label for="sasquatch">Sasquatch</label><br />

            <input type="radio" id="mothman" name="monster" value="M" />
            <label for="mothman">Mothman</label>
        </fieldset>
    </form>
    <!--for treating radio buttons as choose one from many they should have same name field cos radio buttons are grouped by name field-->
</body>

</html>
